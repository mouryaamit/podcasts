services:
  - type: web
    name: podcasts-api
    env: node
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars: []
    autoDeploy: true
    instanceType: "starter"
    instances: 1
    healthCheckPath: "/health"
    ports:
      - 3000
