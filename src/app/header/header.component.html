<header class="fixed-top app_header_wrapper" [class.app_header_shadow]="appHeaderShadow">
  <div class="app_header_strip">
    <a routerLink="institution" routerLinkActive="active" class="header_cta">
      <img [src]="isInstitutionActive ? 'assets/icons/login-white.svg' : 'assets/icons/login-black.svg'" class="pe-3"
        alt="Institution Login Icon" />
      <span>Institution Login</span>
    </a>
    <a routerLink="newsroom" class="header_page_link" [class.active]="isNewsroomEventsActive">Newsroom</a>
    <a routerLink="contact" routerLinkActive="active" class="header_page_link">Contact</a>
  </div>
  <div class="app_header_main">
    <div class="app_header_left">
      <a routerLink="home">
        <img src="assets/images/logo-main.webp" width="248" height="80" class="img-fluid app_logo"
          alt="Jocata Sumpoorn Logo" fetchpriority="high" />
      </a>
    </div>
    <div class="app_header_right">
      <ul class="nav nav-underline" [class.responsive_menu]="isResponsive">
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="home">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="index">Index</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="methodology">Methodology</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="roadmap">Roadmap</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="about">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLinkActive="active" routerLink="contact">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="newsroom" [class.active]="isNewsroomEventsActive">Newsroom</a>
        </li>
        <li class="nav-item">
          <a class="header_cta" routerLinkActive="active" routerLink="institution">
            <img [src]="isInstitutionActive ? 'assets/icons/login-white.svg' : 'assets/icons/login-black.svg'"
              class="pe-3" alt="Institution Login Icon" />
            <span>Institution Login</span>
          </a>
        </li>
      </ul>
    </div>
    <div class="app_hamburger_icon" (click)="toggleMenu()">
      <img [src]="isResponsive ? 'assets/icons/hamburger-close.svg' : 'assets/icons/hamburger-bars.svg'" width="18"
        height="18" alt="Hamburger Icon" />
    </div>
  </div>
</header>
