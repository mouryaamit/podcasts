<div class="app_subscribe_fab_wrapper">
  <span
    class="app_secondary_btn me-3"
    *ngIf="subscribeButton"
    (click)="openDialog()"
    >Subscribe</span
  >

  <button
    mat-mini-fab
    disableRipple
    aria-label="Subscribe"
    [class.fab_close]="!addIcon"
    *ngIf="fabButton"
    (click)="toggleIcon()"
  >
    <mat-icon>{{ addIcon ? "add" : "close" }}</mat-icon>
  </button>
</div>
